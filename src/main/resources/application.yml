server:
  port: 8080

spring:
  application:
    name: sample-mall-java
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  # JPA + H2 数据库配置
  datasource:
    url: jdbc:h2:mem:mall_db
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # H2 控制台（开发调试使用）
  h2:
    console:
      enabled: true
      path: /h2-console
